name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Ubuntu is the primary target and runs across Python versions to
        # catch any 3.x-specific issues in the pybind11 binding. macOS
        # and Windows are tested on one version each to verify the
        # cross-platform time helpers compile and behave correctly.
        include:
          - { os: ubuntu-latest,  python-version: "3.10" }
          - { os: ubuntu-latest,  python-version: "3.11" }
          - { os: ubuntu-latest,  python-version: "3.12" }
          - { os: macos-latest,   python-version: "3.11" }
          - { os: windows-latest, python-version: "3.11" }

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Configure CMake (Release)
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build all targets
      run: cmake --build build --parallel --config Release

    - name: Run C++ test binaries
      run: ctest --test-dir build --build-config Release --output-on-failure --no-tests=error

    - name: Bench smoke check (first 20 lines only)
      if: runner.os != 'Windows'
      run: ./build/bench_temporal | head -20

    - name: Install Python package via pip
      run: |
        python -m pip install --upgrade pip
        pip install .

    - name: Run Python test against installed package
      # Run from a neutral directory so `import galahad` hits
      # site-packages rather than the build/ tree, mirroring a real
      # end-user install.
      working-directory: ${{ runner.temp }}
      run: python ${{ github.workspace }}/python/test_galahad.py
